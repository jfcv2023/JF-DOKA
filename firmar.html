<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Firmar documento</title>
<script src="https://telegram.org/js/telegram-web-app.js" onerror="console.error('Fallo al cargar telegram-web-app.js')"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f5f5f5;
    display: flex; flex-direction: column; align-items: center;
    padding: 20px; min-height: 100vh;
  }
  h2 { margin-bottom: 10px; color: #333; }
  p.instruction { color: #666; font-size: 14px; margin-bottom: 15px; }
  canvas {
    border: 2px solid #999; border-radius: 8px; background: #fff;
    touch-action: none; cursor: crosshair;
    width: 300px; height: 100px;
  }
  .buttons { margin-top: 15px; display: flex; gap: 12px; }
  button {
    padding: 12px 28px; font-size: 16px; border: none;
    border-radius: 8px; cursor: pointer; font-weight: 600;
  }
  #btnConfirmar { background: #2b7a3a; color: #fff; }
  #btnConfirmar:hover { background: #236b30; }
  #btnLimpiar { background: #bbb; color: #333; }
  #btnLimpiar:hover { background: #aaa; }
  #btnCerrar { background: #888; color: #fff; display: none; }
  #btnCerrar:hover { background: #777; }
  #status { margin-top: 15px; color: #555; font-size: 14px; }
</style>
</head>
<body>
<h2>Firma del documento</h2>
<p class="instruction">Dibuja tu firma abajo con el dedo o el raton</p>
<canvas id="canvas"></canvas>
<div class="buttons">
  <button id="btnLimpiar">Limpiar</button>
  <button id="btnConfirmar">Confirmar firma</button>
  <button id="btnCerrar">Cerrar</button>
</div>
<p id="status"></p>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const btnLimpiar = document.getElementById('btnLimpiar');
const btnConfirmar = document.getElementById('btnConfirmar');
const status = document.getElementById('status');

let dibujando = false;
let trazos = [];   // each trazo = array of [x,y] points
let trazoActual = [];

function resizeCanvas() {
  canvas.width = 300;
  canvas.height = 100;
  ctx.strokeStyle = '#003399';
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
}

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  return { x: Math.round(t.clientX - rect.left), y: Math.round(t.clientY - rect.top) };
}

function iniciarTrazo(e) {
  dibujando = true;
  trazoActual = [];
  const p = getPos(e);
  trazoActual.push([p.x, p.y]);
  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
}

function dibujarTrazo(e) {
  if (!dibujando) return;
  const p = getPos(e);
  trazoActual.push([p.x, p.y]);
  ctx.lineTo(p.x, p.y);
  ctx.stroke();
}

function terminarTrazo() {
  if (!dibujando) return;
  dibujando = false;
  if (trazoActual.length > 0) {
    trazos.push(trazoActual);
    trazoActual = [];
  }
}

canvas.addEventListener('mousedown', iniciarTrazo);
canvas.addEventListener('mousemove', dibujarTrazo);
canvas.addEventListener('mouseup', terminarTrazo);
canvas.addEventListener('mouseleave', terminarTrazo);

canvas.addEventListener('touchstart', (e) => { e.preventDefault(); iniciarTrazo(e); });
canvas.addEventListener('touchmove', (e) => { e.preventDefault(); dibujarTrazo(e); });
canvas.addEventListener('touchend', (e) => { e.preventDefault(); terminarTrazo(); });

function limpiar() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  trazos = [];
  trazoActual = [];
  status.textContent = '';
}

function estaVacio() {
  return trazos.length === 0;
}

function confirmar() {
  if (estaVacio()) {
    status.textContent = 'Dibuja tu firma antes de confirmar';
    return;
  }

  const datos = JSON.stringify({ w: 300, h: 100, t: trazos });
  console.log('Telegram:', typeof Telegram, Telegram);
  console.log('Telegram.WebApp:', typeof Telegram !== 'undefined' ? Telegram.WebApp : 'N/A');

  if (typeof Telegram !== 'undefined' && Telegram.WebApp) {
    try {
      const enviado = Telegram.WebApp.sendData(datos);
      console.log('sendData result:', enviado);
      if (enviado) {
        status.textContent = 'Enviado! Cerrando...';
        status.style.color = 'green';
        setTimeout(() => Telegram.WebApp.close(), 1000);
      } else {
        status.textContent = 'Fallo al enviar. Reintenta o cierra manualmente.';
        status.style.color = 'red';
        document.getElementById('btnCerrar').style.display = 'inline';
      }
    } catch(e) {
      console.error('sendData error:', e);
      status.textContent = 'Error: ' + e.message;
      status.style.color = 'red';
      document.getElementById('btnCerrar').style.display = 'inline';
    }
  } else if (typeof Telegram !== 'undefined' && Telegram.WebAppProxy) {
    status.textContent = 'Usando WebAppProxy...';
    Telegram.WebAppProxy.send({ data: datos });
  } else {
    console.log('Telegram.WebApp no disponible');
    status.textContent = 'Descargado como PNG (fuera de Telegram)';
    const img = canvas.toDataURL('image/png');
    const link = document.createElement('a');
    link.download = 'firma.png';
    link.href = img;
    link.click();
  }
}

btnLimpiar.addEventListener('click', limpiar);
btnConfirmar.addEventListener('click', confirmar);
document.getElementById('btnCerrar').addEventListener('click', () => Telegram.WebApp.close());
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

if (typeof Telegram !== 'undefined' && Telegram.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
}
</script>
</body>
</html>
